<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Core Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #f8fafc; padding: 100px; text-align: center; }
        .card { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: inline-block; width: 350px; border: 1px solid #334155; }
        h2 { margin-bottom: 5px; color: #38bdf8; }
        input { width: 100%; padding: 12px; margin: 12px 0; background: #0f172a; border: 1px solid #475569; border-radius: 6px; box-sizing: border-box; color: white; }
        input:focus { border-color: #38bdf8; outline: none; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #7dd3fc; }
        .badge { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 14px; text-align: left; }
        .success { background: #065f46; color: #34d399; border: 1px solid #047857; }
        .error { background: #991b1b; color: #fca5a5; border: 1px solid #b91c1c; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Enterprise Core</h2>
        <p style="color: #94a3b8; margin-top: 0;">QA Target Sandbox App</p>
        
        <!-- Standard HTML Form submitting POST request to the root URL -->
        <form method="POST" action="/">
            <input type="text" id="username-input" name="username" placeholder="Enter Username" required>
            <input type="password" id="password-input" name="password" placeholder="Enter Password" required>
            <button type="submit" id="submit-button">Execute Authentication</button>
        </form>

        <!-- Jinja2 logic block to dynamically render feedback alert boxes -->
        {% if status_message %}
            <div id="alert-box" class="badge {{ status_type }}">
                {{ status_message }}
            </div>
        {% endif %}
    </div>

</body>
</html>
