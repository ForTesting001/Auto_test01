[pytest]
# UPDATE: Force pytest-asyncio to automatically handle all async def test functions
asyncio_mode = auto

# NEW UPDATE: Define explicit event loop scope for fixtures to eliminate PytestDeprecationWarning
asyncio_default_fixture_loop_scope = function

# OPTIONAL: Clean up the terminal console by filtering deprecated warnings
filterwarnings =
    ignore::DeprecationWarning

# Bảo pytest bỏ qua hoàn toàn file test giao diện bị lỗi đường dẫn Chrome này
addopts = --ignore=tests/test_first_login.py