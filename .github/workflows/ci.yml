name: "Enterprise Automation Framework CI Pipeline"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Cho phép bấm nút kích hoạt chạy test thủ công trên giao diện Web

jobs:
  automation-test-suite:
    runs-on: ubuntu-latest

    steps:
    - name: "Step 1: Check out source code repository"
      uses: actions/checkout@v4

    - name: "Step 2: Initialize Python 3.8 environment"
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    # --- KHU VỰC TỐI ƯU CỦA PYTHON PIP ---
    - name: "Step 3a: Cache Python Pip packages"
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-${{ hashFiles('.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: "Step 3b: Install Core and Test Framework dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn requests pydantic pytest pytest-html playwright python-dotenv pytest-asyncio

    # --- KHU VỰC TỐI ƯU CỦA PLAYWRIGHT BINARIES ---
    - name: "Step 4a: Cache Playwright Browser Binaries"
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: "Step 4b: Install Playwright Core Browser Binaries"
      # Sửa lỗi chính tả: thêm dấu chấm "." vào sau chữ steps để truy cập thuộc tính đúng chuẩn
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        python -m playwright install --with-deps

    - name: "Step 5: Boot Mock Enterprise Application Server in Background"
      run: |
        python server.py &
        echo "Waiting for FastAPI server to establish socket connection on port 8000..."
        sleep 3

    - name: "Step 6: Execute Test Suite and Generate HTML Report"
      run: |
        python -m pytest tests/ -v -s --html=html-report/report.html --self-contained-html

    - name: "Step 7: Upload Test Report Artifact to GitHub Interface"
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: "pytest-automation-html-report"
        path: "html-report/"
        retention-days: 7