name: Enterprise Automation Framework CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  automation-test-suite:
    runs-on: ubuntu-latest

    steps:
    - name: Step 1: Check out source code repository
      uses: actions/checkout@v4

    - name: Step 2: Initialize Python 3.8 environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Step 3: Install Core and Test Framework dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn requests pydantic pytest pytest-html

    - name: Step 4: Boot Mock Enterprise Application Server in Background
      run: |
        python server.py &
        echo "Waiting for FastAPI server to establish socket connection on port 8000..."
        sleep 3

    - name: Step 5: Execute Test Suite and Generate HTML Report
      # Lệnh chạy sinh file báo cáo đặt tên là report.html nằm trong thư mục html-report
      run: |
        python -m pytest tests/ -v -s --html=html-report/report.html --self-contained-html

    - name: Step 6: Upload Test Report Artifact to GitHub Interface
      # Bước này luôn chạy (if: always()) kể cả khi có test case bị FAILED để bạn vẫn xem được báo cáo lỗi
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-automation-html-report
        path: html-report/
        retention-days: 7